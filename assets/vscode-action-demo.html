<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VS Code 실습 — 작업 순서 실행</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#cfd3df;font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:14px;padding:26px}
  .ctrls{display:flex;gap:10px;align-items:center}
  .ctrls button{font:inherit;font-size:14px;font-weight:700;color:#fff;background:#007acc;border:0;border-radius:8px;padding:9px 18px;cursor:pointer}
  .ctrls .cap{font-size:13px;color:#555}
  .win{width:1180px;height:720px;background:#1e1e1e;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 18px 60px rgba(20,30,60,.35);font-family:"SF Mono",Menlo,Consolas,"Courier New",monospace}
  .title{height:34px;background:#3c3c3c;display:flex;align-items:center;padding:0 12px;gap:8px;flex:none}
  .dot{width:12px;height:12px;border-radius:50%}.dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .title .t{flex:1;text-align:center;color:#9d9d9d;font-size:12.5px;font-family:"Apple SD Gothic Neo",sans-serif}
  .body{flex:1;display:flex;min-height:0}.act{width:48px;background:#333;flex:none;display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:20px;color:#858585;font-size:21px}.act .on{color:#fff}
  .side{width:300px;background:#252526;flex:none;color:#ccc;overflow:hidden;display:flex;flex-direction:column}.side .hd{font-size:11px;letter-spacing:1px;color:#bbb;padding:12px 16px 6px;font-family:"Apple SD Gothic Neo",sans-serif;font-weight:700}
  .tree{font-size:13px;padding:4px 0 0;overflow-y:auto}.row{display:flex;align-items:center;gap:5px;padding:3px 10px;white-space:nowrap}.row.active{background:#37373d}
  .tw{color:#c5c5c5;width:12px;display:inline-block;text-align:center;font-size:10px}.fold{color:#dcb67a}.file{color:#9cdcfe}.csv{color:#7fd6a0}.nm{color:#cfcfcf;font-family:"Apple SD Gothic Neo",sans-serif}.badge{margin-left:auto;color:#73c991;font-weight:800;font-size:12px;padding-left:8px}
  .row.new{animation:flashIn .5s ease}@keyframes flashIn{from{background:#2e4b32}to{background:transparent}}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}.tabs{height:36px;background:#2d2d2d;display:flex;align-items:center;padding:0 16px;gap:8px;flex:none;color:#fff;font-size:12.5px;font-family:"Apple SD Gothic Neo",sans-serif}.tabs i{color:#9cdcfe;font-style:normal;font-family:monospace}
  .editor{flex:1;background:#1e1e1e;overflow:auto;padding:14px 0;min-height:0}.code{font-size:13px;line-height:1.7;color:#ccc}.code .ln{display:flex}.code .g{width:42px;flex:none;text-align:right;padding-right:16px;color:#5a5a5a;user-select:none}.code .c{flex:1;padding-right:18px;white-space:pre-wrap}
  .h1{color:#c586c0}.key{color:#569cd6}.str{color:#ce9178}.com{color:#6a9955}.cur{color:#73c991}
  .panel{height:250px;background:#1e1e1e;border-top:1px solid #333;flex:none;display:flex;flex-direction:column}.ptabs{height:30px;background:#252526;display:flex;align-items:center;gap:18px;padding:0 16px;flex:none}.ptabs span{font-size:11px;letter-spacing:.5px;color:#858585;font-family:"Apple SD Gothic Neo",sans-serif}.ptabs .on{color:#fff;border-bottom:1px solid #fff;height:30px;display:flex;align-items:center}
  .term{flex:1;overflow-y:auto;padding:10px 16px;font-size:13px;line-height:1.7;color:#d4d4d4}.term .p{color:#5ac8a8}.term .u{color:#e6e6e6}.term .a{color:#c5a3ff}.term .ok{color:#73c991}.term .dim{color:#7a7a7a}.term .step{color:#569cd6;font-weight:800}.term .acc{color:#dcdcaa}.term .gate{color:#f48771;font-weight:800}
  .vsrun-cur{display:inline-block;width:7px;height:1em;background:#d4d4d4;vertical-align:-2px;animation:bk 1s step-end infinite}@keyframes bk{50%{opacity:0}}
</style>
</head>
<body>
  <div class="ctrls">
    <button id="replay">▶ 처음부터 다시 보기</button>
    <span class="cap">실습: 의사결정 문장 → 작업 순서 파일 → Claude 실행 (영업 응대 예시)</span>
  </div>
  <div class="win">
    <div class="title"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="t">sales-response-agent — Claude Code</span></div>
    <div class="body">
      <div class="act"><span class="on">🗂</span><span>🔍</span><span>⎇</span><span>🐞</span><span>⬢</span></div>
      <div class="side">
        <div class="hd">탐색기 · SALES-RESPONSE-AGENT</div>
        <div class="tree" id="tree">
          <div class="row"><span class="tw">▾</span><span class="fold">📂</span><span class="nm">sales-response-agent</span></div>
          <div class="row" style="padding-left:24px"><span class="tw">▾</span><span class="fold">📁</span><span class="nm">00_admin</span></div>
          <div class="row" style="padding-left:46px"><span class="tw"></span><span class="file">📄</span><span class="nm">역할지침.md</span></div>
          <div class="row" style="padding-left:46px"><span class="tw"></span><span class="file">📄</span><span class="nm">절대_하지_말_것.md</span></div>
          <div class="row" style="padding-left:24px"><span class="tw">▾</span><span class="fold">📁</span><span class="nm">01_이번재료</span></div>
          <div class="row r-data" style="padding-left:46px"><span class="tw"></span><span class="csv">▦</span><span class="nm">거래처_민원기록.csv</span></div>
          <div class="row" style="padding-left:24px"><span class="tw">▾</span><span class="fold">📁</span><span class="nm">02_반복기준</span></div>
          <div class="row r-rule" style="padding-left:46px"><span class="tw"></span><span class="file">📄</span><span class="nm">응대_우선순위_기준.md</span></div>
          <div class="row" style="padding-left:46px"><span class="tw"></span><span class="file">📄</span><span class="nm">응대_말투.md</span></div>
          <div class="row" style="padding-left:24px"><span class="tw">▾</span><span class="fold">📁</span><span class="nm">03_작업순서</span></div>
          <div class="row active r-order" style="padding-left:46px"><span class="tw"></span><span class="file">📄</span><span class="nm">응대초안_만들기.md</span></div>
          <div class="row" style="padding-left:24px"><span class="tw">▾</span><span class="fold">📁</span><span class="nm">04_결과물</span></div>
          <div id="slot" style="padding-left:46px"></div>
        </div>
      </div>
      <div class="main">
        <div class="tabs"><i>📄</i><span id="tabname">응대초안_만들기.md</span></div>
        <div class="editor"><div class="code" id="code"></div></div>
        <div class="panel"><div class="ptabs"><span>문제</span><span>출력</span><span class="on">터미널</span><span>포트</span></div><div class="term" id="term"></div></div>
      </div>
    </div>
  </div>
<script>
const $=s=>document.querySelector(s);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const ORDER=[
  ['1','# 응대 초안 만들기','h1'],['2','',''],
  ['3','목표: 민원 기록을 읽고 우선순위 응대 메일 초안으로 바꾼다','com'],['4','',''],
  ['5','작업 순서:','key'],
  ['6','  READ   자료 읽기  · 거래처 민원 기록','cur'],
  ['7','  SORT   분류       · 민원 누적 기준','cur'],
  ['8','  DECIDE 판단       · 응대 우선순위 Top 5','cur'],
  ['9','  MAKE   작성       · 거래처별 메일 초안','cur'],
  ['10','  CHECK  검수       · 보상·확정 표현 표시','cur'],['11','',''],
  ['12','금지: 확정 답변·보상 약속 자동 발송 금지','com'],
  ['13','출력: 응대 메일 초안 + 검수표','key'],
];
const RESULT=[
  ['1','# 응대 메일 초안 · 우선순위 Top 5','h1'],['2','',''],
  ['3','1위 · OO상사 (민원 4건)','key'],
  ['4','"반복된 배송 지연으로 불편을 드려 죄송합니다…"','str'],['5','',''],
  ['6','2위 · △△유통 (민원 3건)','key'],
  ['7','"견적 누락 건 확인 후 다시 안내드리겠습니다…"','str'],['8','',''],
  ['9','3~5위 · 일반 응대 템플릿 적용','com'],['10','',''],
  ['11','검수: 보상·확정 표현은 사람이 확인','com'],
];
function render(rows,cur){
  const c=$('#code');c.innerHTML='';
  rows.forEach(([g,t,cls])=>{const ln=document.createElement('div');ln.className='ln';ln.innerHTML=`<span class="g">${g}</span><span class="c ${cls||''}">${t||' '}</span>`;c.appendChild(ln);});
  if(cur){const last=c.lastChild.querySelector('.c');const s=document.createElement('span');s.className='vsrun-cur';last.appendChild(s);}
}
function line(html){const t=$('#term');const d=document.createElement('div');d.innerHTML=html;t.appendChild(d);t.scrollTop=t.scrollHeight;return d;}
async function type(el,text,sp=28){for(let i=0;i<text.length;i++){el.textContent+=text[i];await sleep(sp);$('#term').scrollTop=$('#term').scrollHeight;}}
function hl(sel){const r=document.querySelector(sel);if(r){r.style.background='#264f78';setTimeout(()=>r.style.background='',900);}}
function addf(name){const s=$('#slot');const d=document.createElement('div');d.className='row new';d.innerHTML=`<span class="tw"></span><span class="file">📄</span><span class="nm">${name}</span><span class="badge">U</span>`;s.appendChild(d);$('#tree').scrollTop=$('#tree').scrollHeight;}
let running=false;
async function run(){
  if(running)return;running=true;$('#term').innerHTML='';$('#slot').innerHTML='';
  $('#tabname').textContent='응대초안_만들기.md';render(ORDER,false);
  $('#replay').disabled=true;$('#replay').style.opacity=.5;
  await sleep(450);
  line('<span class="p">➜ sales-response-agent</span> <span class="dim">claude</span>');await sleep(360);
  const pl=line('<span class="a">❯ </span><span class="u"></span>');
  await type(pl.querySelector('.u'),'03_작업순서/응대초안_만들기.md 그대로 실행해줘.');await sleep(450);
  line('<span class="a">● </span><span class="dim">작업 순서 확인: READ → SORT → DECIDE → MAKE → CHECK</span>');await sleep(700);
  line('<span class="step">READ</span> <span class="ok">●</span> <span class="dim">01_이번재료/거래처_민원기록.csv (32행)</span>');hl('.r-data');await sleep(560);
  line('<span class="step">SORT</span> <span class="dim">민원 누적 기준으로 거래처 분류</span>');hl('.r-rule');await sleep(560);
  line('<span class="step">DECIDE</span> <span class="dim">응대 우선순위</span> <span class="acc">Top 5 결정</span>');await sleep(640);
  addf('응대메일_초안.md');
  line('<span class="step">MAKE</span> <span class="ok">●</span> Write <span class="cur">04_결과물/응대메일_초안.md</span> <span class="ok">✓</span>');
  $('#tabname').textContent='응대메일_초안.md';
  for(let i=1;i<=RESULT.length;i++){render(RESULT.slice(0,i),true);await sleep(155);}
  await sleep(400);
  addf('검수표.md');
  line('<span class="ok">●</span> Write <span class="cur">04_결과물/검수표.md</span> <span class="ok">✓</span>');await sleep(520);
  line('<span class="step">CHECK</span> <span class="gate">정지 — 보상·확정 표현은 사람이 확인 후 발송.</span>');
  $('#term').scrollTop=$('#term').scrollHeight;
  $('#replay').disabled=false;$('#replay').style.opacity=1;running=false;
}
$('#replay').addEventListener('click',run);
render(ORDER,false);
window.addEventListener('load',()=>setTimeout(run,500));
</script>
</body>
</html>
