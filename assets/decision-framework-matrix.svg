<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .ink{fill:#111827}
      .muted{fill:#6b7687}
      .blue{fill:#2364e8}
      .navy{fill:#0f1e2d}
      .soft{fill:#ecf2ff}
      .line{stroke:#cfd9ea;stroke-width:3}
      .card{fill:#fff;stroke:#bfd1ff;stroke-width:3}
      .card-soft{fill:#eef4ff;stroke:#bfd1ff;stroke-width:3}
      .shadow{filter:url(#shadow)}
      text{font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;letter-spacing:.08em}
    </style>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#9fb4d6" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect class="bg" width="1920" height="1080"/>

  <rect x="130" y="100" rx="28" ry="28" width="335" height="58" fill="#e8f0ff"/>
  <text x="157" y="139" class="blue mono" font-size="27" font-weight="900">DECISION FRAMEWORK</text>

  <text x="130" y="250" class="ink" font-size="64" font-weight="950">실무 판단 프레임워크: AI 적용 매트릭스</text>
  <text x="130" y="315" class="muted" font-size="31" font-weight="650">모든 업무를 자동화할 필요는 없습니다. </text>
  <text x="662" y="315" class="blue" font-size="31" font-weight="900">빈도(Frequency)</text>
  <text x="902" y="315" class="muted" font-size="31" font-weight="650">와 </text>
  <text x="952" y="315" class="blue" font-size="31" font-weight="900">판단 복잡성(Complexity)</text>
  <text x="1327" y="315" class="muted" font-size="31" font-weight="650">에 따라 전략을 달리하세요.</text>

  <text x="1485" y="112" class="ink" font-size="40" font-weight="950">TIP은 찍어가자!</text>
  <g transform="translate(1590 128) scale(.82)">
    <path d="M30 34h19l8-14h76l8 14h20c16 0 29 13 29 29v95c0 16-13 29-29 29H30c-16 0-29-13-29-29V63c0-16 13-29 29-29z" fill="#000"/>
    <circle cx="96" cy="111" r="47" fill="none" stroke="#fff" stroke-width="8"/>
    <circle cx="96" cy="111" r="31" fill="#000"/>
  </g>

  <g transform="translate(300 390)">
    <line x1="96" y1="0" x2="96" y2="625" class="line"/>
    <path d="M96 0l-9 18h18z" fill="#cfd9ea"/>
    <text x="0" y="36" class="ink" font-size="21" font-weight="900">High</text>
    <rect x="-13" y="8" width="74" height="39" rx="6" fill="#eef2f7" opacity=".85"/>
    <text x="0" y="603" class="ink" font-size="21" font-weight="900">Low</text>
    <rect x="-13" y="575" width="74" height="39" rx="6" fill="#eef2f7" opacity=".85"/>
    <text x="84" y="366" class="muted mono" font-size="16" font-weight="800" transform="rotate(-90 84 366)">FREQUENCY</text>
  </g>

  <g transform="translate(432 395)">
    <line x1="0" y1="650" x2="1260" y2="650" class="line"/>
    <path d="M1260 650l-18-9v18z" fill="#cfd9ea"/>
    <rect x="16" y="655" width="74" height="39" rx="6" fill="#eef2f7" opacity=".85"/>
    <text x="30" y="682" class="ink" font-size="21" font-weight="900">Low</text>
    <rect x="1192" y="655" width="74" height="39" rx="6" fill="#eef2f7" opacity=".85"/>
    <text x="1207" y="682" class="ink" font-size="21" font-weight="900">High</text>
    <text x="552" y="676" class="muted mono" font-size="16" font-weight="800">COMPLEXITY</text>
  </g>

  <g transform="translate(432 395)">
